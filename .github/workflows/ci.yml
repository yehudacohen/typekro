name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5 # TODO: pin to SHA for supply chain security

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.x'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Docs validation
        run: |
          bun run docs:validate
          bun run docs:check-lines
          bun run docs:check-examples
          bun run docs:check-links
          bun run docs:build

      - name: Circular dependency check
        run: bunx madge --circular --extensions ts src/

      - name: Unit tests with coverage
        run: bun run test:coverage

      - name: Integration YAML tests
        run: bun run test:integration:yaml

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -Lo ./kubectl https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Required live cluster integration tests
        run: CREATE_KIND_CLUSTER=true bun run test:integration:required

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
